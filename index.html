<!DOCTYPE html>
<html>
<head>
    <title>Cancellation Survey Link Generator</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            color: white;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background-color: white;
            color: black;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 600px;
            box-sizing: border-box;
            position: relative;
        }
        .form-container::before {
            content: '';
            display: block;
            height: 15px;
            background-color: #4f6ca4;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        h1 {
            font-weight: bold;
            color: black;
            text-align: center;
        }
        label, input, select, option {
            color: black;
            font-family: 'Poppins', sans-serif;
        }
        input[type="text"], select, .generate-button {
            background-color: #f0f0f0;
            color: black;
            border: 1px solid #ccc;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
        }
        .generate-button {
            display: block;
            text-align: center;
            margin: 20px auto 0;
            cursor: pointer;
            background-color: #4f6ca4;
            color: white;
        }
        .footer {
            text-align: left;
            margin-top: 20px;
            color: black;
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
        }
        .result-container {
            margin-top: 20px;
            color: black;
            font-family: 'Poppins', sans-serif;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="form-container">
        <h1>XO - NBA Cancellation Survey Link Generator</h1>
        <form id="myForm">
            <label for="emailField"><b>User's Email *</b></label><br>
            <input type="text" id="emailField" name="emailAddress" required><br>
            <button type="button" class="generate-button" onclick="generateLink()">Generate Link</button>
        </form>
        <div id="resultContainer" class="result-container"></div>
        <div class="footer">
            Created by:<br>Ralph Lawrence Villamor  |  Team Lead - NBA<br><br>
        </div>
    </div>

    <script>
        function generateLink() {
            const emailField = document.getElementById('emailField').value.trim();
            const resultContainer = document.getElementById('resultContainer');

            if (emailField) {
                const link = `https://nbacx.az1.qualtrics.com/jfe/form/SV_eP5iKtqslN9wNF4?email=${encodeURIComponent(emailField)}`;
                resultContainer.innerHTML = `<p>Generated Link: <a href="${link}" target="_blank">${link}</a></p>`;
            } else {
                resultContainer.innerHTML = '<p style="color: red;">Please enter a valid email address.</p>';
            }
        }
    </script>
</body>
</html>
